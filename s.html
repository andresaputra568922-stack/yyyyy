<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DITZYA AI | TEMAN CURHAT 🌙</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Orbitron:wght@600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #05070a;
            color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* SCREEN LOGIN (NAMA) */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; 
            text-align: center; width: 85%; max-width: 350px;
        }

        /* HEADER */
        header { 
            padding: 15px 20px; background: rgba(10,10,15,0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .user-online { font-size: 10px; color: #00ff88; display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 7px; height: 7px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; }

        /* CHAT BOX AREA */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
            background: radial-gradient(circle at top, #0a1020, #05070a);
        }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
        
        .user { align-self: flex-end; background: #00d2ff; color: #000; font-weight: 700; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

        /* INPUT AREA (PENTING: BIAR GAK HILANG) */
        .input-box-wrap { 
            padding: 15px; background: #0a0a0c; border-top: 1px solid #222;
            display: flex; gap: 10px; align-items: center; z-index: 200;
        }
        #user-input { 
            flex: 1; background: #1a1a1f; border: 1px solid #333; 
            padding: 12px 20px; border-radius: 25px; color: white; outline: none; font-size: 14px;
        }
        #user-input:focus { border-color: #00d2ff; box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        
        .btn-send { 
            width: 45px; height: 45px; background: #00d2ff; border: none; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-send:active { transform: scale(0.9); }

        .health-notif { background: #ffcc00; color: #000; font-size: 11px; text-align: center; padding: 5px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <!-- SCREEN LOGIN NAMA -->
    <div id="login-screen">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; color:#00d2ff; margin-bottom:10px;">DITZYA AI</h2>
            <p style="font-size:12px; color:#888; margin-bottom:20px;">Daftar Nama Dulu Ya Bang...</p>
            <input type="text" id="reg-name" placeholder="Nama Kamu Siapa?" style="width:100%; padding:12px; border-radius:10px; border:1px solid #333; background:#111; color:#fff; margin-bottom:15px; outline:none;">
            <button onclick="saveName()" style="width:100%; padding:12px; border-radius:10px; background:#00d2ff; border:none; font-weight:bold; cursor:pointer;">MASUK CHAT</button>
        </div>
    </div>

    <header>
        <div>
            <h1 style="font-family:'Orbitron'; font-size:14px; color:#00d2ff;">DITZYA <span style="color:#fff">FRIEND</span></h1>
            <p id="welcome-msg" style="font-size:10px; color:#666;">Bismillah...</p>
        </div>
        <div class="user-online">
            <div class="online-dot"></div>
            <span id="active-val">128 Online</span>
        </div>
    </header>

    <div class="health-notif" id="health-box">⚠️ Bang, sudah lama curhatnya. Istirahat sejenak yuk!</div>

    <div id="chat-container">
        <!-- Chat Muncul Disini -->
    </div>

    <!-- AREA INPUT (TEMPAT NGETIK) -->
    <div class="input-box-wrap">
        <input type="text" id="user-input" placeholder="Tulis curhatanmu disini..." autocomplete="off">
        <button class="btn-send" onclick="handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const API_KEY = "AIzaSyB6vTfwS5dDWYTSKAlTDoQHgE903mGg3ac";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });

        let myName = localStorage.getItem('ditzya_name');
        let chatCount = 0;
        let history = [];

        // CEK NAMA
        if (myName) {
            document.getElementById('login-screen').style.display = 'none';
            initApp();
        }

        window.saveName = function() {
            const name = document.getElementById('reg-name').value.trim();
            if (name) {
                localStorage.setItem('ditzya_name', name);
                myName = name;
                document.getElementById('login-screen').style.display = 'none';
                initApp();
            }
        };

        function initApp() {
            document.getElementById('welcome-msg').innerText = `Halo, Bang ${myName}! ✨`;
            // Setting kepribadian AI
            history = [
                { role: "user", parts: [{ text: `Nama saya ${myName}. Kamu adalah teman curhatku yang islami, sangat sopan, ramah, dan baik hati. Gunakan kata-kata sopan, panggil aku namaku, dan ingatkan aku untuk istirahat jika sudah chat lebih dari 10 kali.` }] },
                { role: "model", parts: [{ text: `Bismillah, Ahlan wa Sahlan Bang ${myName}. Saya siap jadi pendengar yang baik untukmu. Mari berbagi cerita.` }] }
            ];
            addChat("ai", `Assalamu'alaikum Bang ${myName}! Senang sekali bisa ketemu. Mau curhat apa hari ini?`);
            
            // Simulasi user online
            setInterval(() => {
                document.getElementById('active-val').innerText = (120 + Math.floor(Math.random()*30)) + " Online";
            }, 3000);

            // Layar Anti-Mati
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
        }

        window.handleSend = async function() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            addChat("user", msg);
            input.value = "";
            chatCount++;

            // Health Reminder
            if (chatCount >= 10) document.getElementById('health-box').style.display = 'block';

            history.push({ role: "user", parts: [{ text: msg }] });

            try {
                const chat = model.startChat({ history: history });
                const result = await chat.sendMessage(msg);
                const response = await result.response;
                const aiText = response.text();

                addChat("ai", aiText);
                history.push({ role: "model", parts: [{ text: aiText }] });

                if (chatCount === 10) {
                    addChat("ai", `Bang ${myName}, sepertinya kita sudah asyik ngobrol cukup lama ya. Alhamdulillah, tapi jangan lupa istirahat sebentar ya Bang, biar mata dan pikiran segar lagi. Shalat atau minum air putih dulu sana. 😊`);
                }
            } catch (e) {
                addChat("ai", "Maaf Bang, ada gangguan teknis sedikit. Boleh diulang?");
            }
        };

        function addChat(type, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Enter Key Support
        document.getElementById('user-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleSend();
        });
    </script>
</body>
</html>
