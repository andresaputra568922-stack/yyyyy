<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITIYA ARENA PRO | QRIS & SURVIVAL 🔥</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap');

        :root {
            --neon-pink: #ff0055;
            --neon-blue: #00f2ff;
            --neon-gold: #ffcc00;
            --neon-green: #39ff14;
            --bg: #050507;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; overflow: hidden; }

        /* LOADING SCREEN */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #111; border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MENU UTAMA */
        #menu { position: fixed; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin-bottom: 5px; }
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 15px; border-radius: 12px; margin: 10px; width: 280px; color: white; text-align: center; font-size: 1rem; }
        .btn-main { background: linear-gradient(45deg, var(--neon-pink), #8000ff); border: none; color: white; padding: 15px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; box-shadow: 0 0 15px rgba(255,0,85,0.4); }
        .btn-main:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--neon-pink); }

        /* HUD GAME */
        #gameUI { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 20px; border: 1px solid var(--neon-blue); z-index: 10; backdrop-filter: blur(10px); }
        .hp-bar-bg { width: 200px; height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: var(--neon-green); transition: 0.3s; }
        .stats { display: flex; gap: 20px; margin-top: 15px; font-weight: bold; font-family: monospace; }

        /* SHOP & MODALS */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--neon-blue); padding: 30px; border-radius: 25px; display: none; z-index: 1000; width: 320px; text-align: center; box-shadow: 0 0 50px #000; }
        .btn-shop { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }

        /* SIDE BUTTONS */
        .side-btns { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .circle-btn:hover { transform: rotate(15deg) scale(1.1); }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p style="margin-top:20px">Menghubungkan ke Server Aditiya...</p></div>

    <div id="menu">
        <div style="font-size: 0.8rem; color: var(--neon-pink); letter-spacing: 5px; margin-bottom: 10px;">OFFICIAL SERVER</div>
        <h1>ADITIYA<span> PRO</span></h1>
        <input type="text" id="playerName" class="input-box" placeholder="Nickname Kamu...">
        <input type="text" id="roomId" class="input-box" placeholder="ID Room Mabar..." value="ARENA-1">
        <button class="btn-main" onclick="startGame()">GASKEUN! 🚀</button>
    </div>

    <!-- UI ATAS -->
    <div id="gameUI" style="display: none;">
        <div id="uiName" style="font-family: 'Orbitron'; color: var(--neon-blue);">PLAYER</div>
        <div class="hp-bar-bg"><div id="hp-fill"></div></div>
        <div class="stats">
            <span style="color: var(--neon-gold);">💰 <span id="uiCoin">0</span></span>
            <span style="color: var(--neon-blue);">💎 <span id="uiDM">0</span></span>
            <span style="color: var(--neon-pink);">❤️ <span id="uiLives">3</span></span>
        </div>
    </div>

    <!-- TOMBOL SAMPING -->
    <div class="side-btns">
        <button class="circle-btn" style="background: var(--neon-gold);" onclick="toggleModal('shopModal')">🛍️</button>
        <button class="circle-btn" style="background: var(--neon-blue);" onclick="toggleModal('topupModal')">💳</button>
    </div>

    <!-- MODAL SHOP -->
    <div id="shopModal" class="modal">
        <h2 style="margin-bottom:20px">MARKET ARENA</h2>
        <button class="btn-shop" style="background: var(--neon-green);" onclick="buyLife()">❤️ BELI 1 NYAWA (50 DM)</button>
        <button class="btn-shop" style="background: var(--neon-pink); color:white;" onclick="changeColor('#ff0055')">SKIN PINK (FREE)</button>
        <button class="btn-shop" style="background: var(--neon-gold);" onclick="buyPremiumSkin()">SKIN GOLD (100 DM)</button>
        <button class="btn-shop" style="background: #333; color:white;" onclick="toggleModal('shopModal')">KELUAR</button>
    </div>

    <!-- MODAL TOPUP -->
    <div id="topupModal" class="modal">
        <h2 style="margin-bottom:10px">TOP UP DM</h2>
        <p style="font-size: 0.8rem; color: #777; margin-bottom: 20px;">Otomatis via QRIS Pakasir</p>
        <button class="btn-shop" style="background: #e1f5fe;" onclick="payPakasir(10000)">💎 1,000 DM - Rp10.000</button>
        <button class="btn-shop" style="background: #b3e5fc;" onclick="payPakasir(50000)">💎 5,500 DM - Rp50.000</button>
        <button class="btn-shop" style="background: #81d4fa;" onclick="payPakasir(100000)">💎 12,000 DM - Rp100.000</button>
        <button class="btn-shop" style="background: #333; color:white;" onclick="toggleModal('topupModal')">BATAL</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD0Rx5rl4M95exw46daUAubMIXJZ7c2EWY",
            authDomain: "yesss-ffb8d.firebaseapp.com",
            projectId: "yesss-ffb8d",
            databaseURL: "https://yesss-ffb8d-default-rtdb.firebaseio.com",
            storageBucket: "yesss-ffb8d.firebasestorage.app",
            messagingSenderId: "853380439217",
            appId: "1:853380439217:web:31391122a25f07dec9d690"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- DATA PAKASIR ADITIYA ---
        const PAKASIR_SLUG = "yy";
        const PAKASIR_API = "09uKo4aM73FgVUZZLmsIRAiiwvx3Ym5Y";

        // --- GAME VARIABLES ---
        let myId, myRoom, myName, myColor = '#00f2ff';
        let players = {};
        let myData = { level: 1, coin: 0, dm: 0, hp: 100, lives: 3 };
        let obstacles = [];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.onload = () => document.getElementById('loader').style.display = 'none';

        function startGame() {
            myName = document.getElementById('playerName').value || "User_" + Math.floor(Math.random()*99);
            myRoom = document.getElementById('roomId').value || "ARENA-1";
            myId = myName.replace(/\s+/g, '_');

            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            document.getElementById('uiName').innerText = myName;

            // Load Global Data
            db.ref(`users/${myId}`).on('value', (snap) => {
                if(snap.exists()) {
                    myData = snap.val();
                    if(myData.hp <= 0 && myData.lives > 0) { myData.hp = 100; }
                    updateHUD();
                } else {
                    saveUserData();
                }
            });

            // Mabar Sync
            db.ref(`rooms/${myRoom}/players/${myId}`).set({ name: myName, x: 200, y: 200, color: myColor, hp: 100 });
            db.ref(`rooms/${myRoom}/players/${myId}`).onDisconnect().remove();
            db.ref(`rooms/${myRoom}/players`).on('value', (snap) => players = snap.val() || {});

            createObstacles();
            gameLoop();
        }

        function createObstacles() {
            for(let i=0; i<5; i++) {
                obstacles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, w: 100, h: 10, speed: 2 + Math.random()*3 });
            }
        }

        // --- SISTEM TOPUP QRIS ---
        function payPakasir(amount) {
            const order_id = `ADIT-${myId}-${Date.now()}`;
            const url = `https://app.pakasir.com/pay/${PAKASIR_SLUG}/${amount}?order_id=${order_id}`;
            alert("Selesaikan pembayaran QRIS. DM akan masuk otomatis setelah Admin konfirmasi!");
            window.open(url, "_blank");
            toggleModal('topupModal');
        }

        // --- SHOP LOGIC ---
        function buyLife() {
            if(myData.dm >= 50) {
                myData.dm -= 50;
                myData.lives += 1;
                myData.hp = 100;
                saveUserData();
                alert("Nyawa Bertambah! ❤️");
            } else { alert("DM Gak Cukup Bang!"); }
        }

        function buyPremiumSkin() {
            if(myData.dm >= 100) {
                myData.dm -= 100;
                myColor = '#ffcc00';
                saveUserData();
                alert("Skin Gold Aktif! ✨");
            } else { alert("DM Gak Cukup!"); }
        }

        function changeColor(c) { myColor = c; }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        // --- CORE GAME ENGINE ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if(myData.hp <= 0) return;

            let moved = false;
            let me = players[myId];
            if(!me) return;

            if (keys['KeyW']) { me.y -= 5; moved = true; }
            if (keys['KeyS']) { me.y += 5; moved = true; }
            if (keys['KeyA']) { me.x -= 5; moved = true; }
            if (keys['KeyD']) { me.x += 5; moved = true; }

            // Batas Layar
            if(me.x < 0) me.x = 0; if(me.x > canvas.width) me.x = canvas.width;
            if(me.y < 0) me.y = 0; if(me.y > canvas.height) me.y = canvas.height;

            // Cek Tabrakan Laser (Obstacle)
            obstacles.forEach(ob => {
                ob.y += ob.speed;
                if(ob.y > canvas.height) ob.y = -20;
                
                let dist = Math.hypot(me.x - ob.x, me.y - ob.y);
                if(dist < 30) {
                    myData.hp -= 2;
                    if(myData.hp <= 0) {
                        if(myData.lives > 0) {
                            myData.lives--;
                            myData.hp = (myData.lives > 0) ? 100 : 0;
                            alert(myData.lives > 0 ? "Nyawa Berkurang!" : "GAME OVER! Top Up atau Beli Nyawa di Shop.");
                        }
                    }
                    saveUserData();
                }
            });

            if(moved) {
                myData.coin += 0.1;
                updateHUD();
                db.ref(`rooms/${myRoom}/players/${myId}`).update({ x: me.x, y: me.y, color: myColor, hp: myData.hp });
            }
        }

        function draw() {
            ctx.fillStyle = '#050507';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Lasers
            obstacles.forEach(ob => {
                ctx.fillStyle = varColor('--neon-pink');
                ctx.shadowBlur = 15; ctx.shadowColor = 'red';
                ctx.fillRect(ob.x - 50, ob.y, 100, 3);
            });

            // Draw Players
            Object.values(players).forEach(p => {
                if(p.hp <= 0) return;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 20; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = "white"; ctx.font = "bold 12px Orbitron";
                ctx.fillText(p.name, p.x, p.y - 35);
                
                // HP Mini Bar
                ctx.fillStyle = "#333"; ctx.fillRect(p.x - 20, p.y - 30, 40, 4);
                ctx.fillStyle = varColor('--neon-green'); ctx.fillRect(p.x - 20, p.y - 30, (p.hp/100)*40, 4);
            });
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

        function updateHUD() {
            document.getElementById('uiCoin').innerText = Math.floor(myData.coin);
            document.getElementById('uiDM').innerText = myData.dm;
            document.getElementById('uiLives').innerText = myData.lives;
            document.getElementById('hp-fill').style.width = myData.hp + "%";
            if(myData.hp < 30) document.getElementById('hp-fill').style.background = "red";
            else document.getElementById('hp-fill').style.background = varColor('--neon-green');
        }

        function saveUserData() {
            db.ref(`users/${myId}`).set(myData);
        }

        function gameLoop() {
            update(); draw(); requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
